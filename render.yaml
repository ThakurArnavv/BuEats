services:
  - type: web
    name: bueats
    runtime: node
    rootDir: BuEats/backend
    buildCommand: cd ../foodcampus && npm install && npm run build && cd ../backend && npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
